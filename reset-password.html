<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Kata Laluan - UsahawanDigital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>🇲🇾 Usahawan<span>Digital</span></h1></div>
            <div class="nav-links"><a href="index.html">Utama</a><a href="login.html">Log Masuk</a></div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Reset Kata Laluan</h2>
            <p class="auth-subtitle">Masukkan kata laluan baru anda</p>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label>Kata Laluan Baru</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" placeholder="Minimum 6 aksara" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">👁️</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Ulang Kata Laluan Baru</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Taip semula kata laluan" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</button>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary btn-full">Reset Password →</button>
            </form>
            
            <div id="resetMessage" class="message-box"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.type === 'password' ? 'text' : 'password';
            field.type = type;
        }

        const resetForm = document.getElementById('resetPasswordForm');
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('resetMessage');
            
            if (newPassword !== confirmPassword) {
                messageDiv.innerHTML = '<div class="message-box error">Kata laluan tidak sama</div>';
                return;
            }
            
            if (newPassword.length < 6) {
                messageDiv.innerHTML = '<div class="message-box error">Kata laluan mesti sekurang-kurangnya 6 aksara</div>';
                return;
            }
            
            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });
                
                if (error) throw error;
                
                messageDiv.innerHTML = '<div class="message-box success">Kata laluan berjaya direset! Sila log masuk.</div>';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            } catch (error) {
                messageDiv.innerHTML = `<div class="message-box error">Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>

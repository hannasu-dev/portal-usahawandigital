<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akaun - UsahawanDigital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>🇲🇾 Usahawan<span>Digital</span></h1></div>
            <div class="nav-links">
                <a href="index.html">Utama</a>
                <a href="login.html">Log Masuk</a>
                <a href="register.html" class="active">Daftar</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Daftar Akaun Baru</h2>
            <p class="auth-subtitle">Percuma selama-lamanya untuk usahawan mikro</p>
            
            <form id="registerForm">
                <!-- Basic Info -->
                <div class="form-group">
                    <label>Nama Penuh</label>
                    <input type="text" id="fullName" placeholder="contoh: Nurul Hanna" required>
                </div>
                
                <div class="form-group">
                    <label>Emel</label>
                    <input type="email" id="email" placeholder="email@contoh.com" required>
                </div>
                
                <div class="form-group">
                    <label>Kata Laluan (minimum 6 aksara)</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="form-group">
                    <label>🏪 Nama Perniagaan</label>
                    <input type="text" id="businessName" placeholder="contoh: Kek Hanna Homemade">
                </div>

                <div class="form-group">
                    <label>📋 Jenis Perniagaan</label>
                    <select id="businessType" required>
                        <option value="fnb">🍔 F&B (Makanan & Minuman)</option>
                        <option value="retail">👗 Retail / Butik</option>
                        <option value="servis">✂️ Perkhidmatan / Servis</option>
                    </select>
                </div>

                <!-- Products Section (Initial Products) -->
                <div class="products-register-section">
                    <div class="products-header">
                        <span>📦 Produk/Item Perniagaan (Optional)</span>
                        <button type="button" class="btn-add-item-register" onclick="addRegisterProductRow()">+ Tambah Produk</button>
                    </div>
                    <p class="form-note">Tambah produk/item perniagaan anda untuk memudahkan pengisian rekod jualan nanti.</p>
                    <div id="registerProductsList"></div>
                </div>
                
                <button type="submit" class="btn-primary btn-full" id="registerBtn">Daftar Sekarang →</button>
            </form>
            
            <p class="auth-footer">Sudah ada akaun? <a href="login.html">Log Masuk di sini</a></p>
            <div id="registerMessage" class="message-box" style="display:none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let productCounter = 0;
        
        function addRegisterProductRow() {
            const container = document.getElementById('registerProductsList');
            const productId = Date.now() + productCounter++;
            
            const row = document.createElement('div');
            row.className = 'product-row-register';
            row.id = `reg-product-${productId}`;
            row.innerHTML = `
                <input type="text" class="product-name" placeholder="Nama produk (cth: Kek Coklat)" style="flex:2;">
                <input type="number" class="product-price" placeholder="Harga (RM)" step="0.01" style="flex:1;">
                <input type="text" class="product-category" placeholder="Kategori (cth: Kek)" style="flex:1.5;">
                <button type="button" class="btn-remove-product" onclick="removeRegisterProductRow('${productId}')">🗑️</button>
            `;
            container.appendChild(row);
        }
        
        function removeRegisterProductRow(productId) {
            const row = document.getElementById(`reg-product-${productId}`);
            if (row) row.remove();
        }
        
        function getRegisterProducts() {
            const products = [];
            const rows = document.querySelectorAll('#registerProductsList .product-row-register');
            rows.forEach(row => {
                const name = row.querySelector('.product-name')?.value.trim();
                const price = parseFloat(row.querySelector('.product-price')?.value);
                const category = row.querySelector('.product-category')?.value.trim();
                if (name && price > 0 && category) {
                    products.push({ name, price, category });
                }
            });
            return products;
        }
        
        // Handle Registration
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('registerMessage');
        
        if (registerForm) {
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const businessName = document.getElementById('businessName').value || '';
                const businessType = document.getElementById('businessType').value;
                const products = getRegisterProducts();
                const registerBtn = document.getElementById('registerBtn');
                
                if (password.length < 6) {
                    showMessage('Kata laluan mesti sekurang-kurangnya 6 aksara', 'error');
                    return;
                }
                
                registerBtn.disabled = true;
                registerBtn.textContent = 'Mendaftar...';
                messageDiv.style.display = 'none';
                
                try {
                    // Register with Supabase Auth
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullName,
                                business_name: businessName,
                                business_type: businessType,
                                jenis_perniagaan: businessType
                            }
                        }
                    });
                    
                    if (error) throw error;
                    
                    if (data.user) {
                        // Create profile
                        const { error: profileError } = await supabaseClient
                            .from('profiles')
                            .insert([{
                                id: data.user.id,
                                full_name: fullName,
                                email: email,
                                business_name: businessName,
                                business_type: businessType,
                                jenis_perniagaan: businessType,
                                created_at: new Date().toISOString()
                            }]);
                        
                        if (profileError) throw profileError;
                        
                        // Insert products if any
                        if (products.length > 0) {
                            const productsToInsert = products.map(p => ({
                                user_id: data.user.id,
                                name: p.name,
                                price: p.price,
                                category: p.category,
                                business_type: businessType,
                                created_at: new Date().toISOString()
                            }));
                            
                            const { error: productsError } = await supabaseClient
                                .from('products')
                                .insert(productsToInsert);
                            
                            if (productsError) console.error('Products insert error:', productsError);
                        }
                        
                        showMessage('Pendaftaran berjaya!', 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    showMessage(`Ralat: ${error.message}`, 'error');
                } finally {
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Daftar Sekarang →';
                }
            });
        }
        
        function showMessage(msg, type) {
            messageDiv.style.display = 'block';
            messageDiv.className = `message-box ${type}`;
            messageDiv.innerHTML = msg;
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }
        
        // Add CSS for register product rows
        const style = document.createElement('style');
        style.textContent = `
            .products-register-section {
                margin-top: 1.5rem;
                padding-top: 1rem;
                border-top: 1px solid #e2e8f0;
            }
            .products-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
            }
            .btn-add-item-register {
                background: #1a5f7a;
                color: white;
                border: none;
                padding: 0.3rem 0.8rem;
                border-radius: 20px;
                cursor: pointer;
                font-size: 0.75rem;
            }
            .product-row-register {
                display: flex;
                gap: 0.5rem;
                margin-bottom: 0.5rem;
                align-items: center;
            }
            .product-row-register input {
                padding: 0.5rem;
                border: 1px solid #cbd5e1;
                border-radius: 8px;
                font-size: 0.85rem;
            }
            .btn-remove-product {
                background: #fee2e2;
                color: #dc2626;
                border: none;
                padding: 0.4rem 0.6rem;
                border-radius: 8px;
                cursor: pointer;
            }
            @media (max-width: 768px) {
                .product-row-register {
                    flex-wrap: wrap;
                }
                .product-row-register input {
                    flex: 1 1 100% !important;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akaun - UsahawanDigital</title>
        <!-- PWA MANIFEST & META TAGS -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="theme-color" content="#1a5f7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>🇲🇾 Usahawan<span>Digital</span></h1></div>
            <div class="nav-links">
                <a href="index.html">Utama</a>
                <a href="login.html">Log Masuk</a>
                <a href="register.html" class="active">Daftar</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card auth-card-large">
            <h2>Daftar Akaun Baru</h2>
            <p class="auth-subtitle">Percuma selama-lamanya untuk usahawan mikro</p>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nama Penuh</label>
                        <input type="text" id="fullName" placeholder="contoh: Nurul Hanna" required>
                    </div>
                    <div class="form-group">
                        <label>Emel</label>
                        <input type="email" id="email" placeholder="email@contoh.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Kata Laluan (minimum 6 aksara)</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>🏪 Nama Perniagaan</label>
                        <input type="text" id="businessName" placeholder="contoh: Kek Hanna Homemade">
                    </div>
                    <div class="form-group">
                        <label>📋 Jenis Perniagaan</label>
                        <select id="businessType" required>
                            <option value="fnb">🍔 F&B (Makanan & Minuman)</option>
                            <option value="retail">👗 Retail / Butik</option>
                            <option value="servis">✂️ Perkhidmatan / Servis</option>
                        </select>
                    </div>
                </div>

                <!-- Products Section -->
                <div class="products-register-section">
                    <div class="products-header">
                        <span>📦 Produk/Item Perniagaan (Optional)</span>
                        <button type="button" class="btn-add-item-register" onclick="addRegisterProductRow()">+ Tambah Produk</button>
                    </div>
                    <p class="form-note">Tambah produk/item perniagaan anda untuk memudahkan pengisian rekod jualan nanti.</p>
                    <div id="registerProductsList" class="register-products-list"></div>
                </div>
                
                <button type="submit" class="btn-primary btn-full" id="registerBtn">Daftar Sekarang →</button>
            </form>
            
            <p class="auth-footer">Sudah ada akaun? <a href="login.html">Log Masuk di sini</a></p>
            <div id="registerMessage" class="message-box" style="display:none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let productCounter = 0;
        let currentBusinessType = 'fnb';
        
        // Kategori berdasarkan jenis perniagaan
        const categoryOptions = {
            fnb: [
                { value: "Kek & Pastri", label: "🍰 Kek & Pastri" },
                { value: "Minuman", label: "🥤 Minuman" },
                { value: "Makanan Utama", label: "🍝 Makanan Utama" },
                { value: "Pencuci Mulut", label: "🍨 Pencuci Mulut" },
                { value: "Lain-lain", label: "📝 Lain-lain" }
            ],
            retail: [
                { value: "Pakaian Wanita", label: "👗 Pakaian Wanita" },
                { value: "Pakaian Lelaki", label: "👕 Pakaian Lelaki" },
                { value: "Pakaian Kanak-Kanak", label: "👶 Pakaian Kanak-Kanak" },
                { value: "Aksesori", label: "💍 Aksesori" },
                { value: "Kasut & Beg", label: "👟 Kasut & Beg" },
                { value: "Lain-lain", label: "📝 Lain-lain" }
            ],
            servis: [
                { value: "Servis Utama", label: "✂️ Servis Utama" },
                { value: "Rawatan", label: "💆 Rawatan" },
                { value: "Konsultasi", label: "📋 Konsultasi" },
                { value: "Produk Tambahan", label: "🧴 Produk Tambahan" },
                { value: "Lain-lain", label: "📝 Lain-lain" }
            ]
        };
        
        function getCategorySelectHtml() {
            const cats = categoryOptions[currentBusinessType] || categoryOptions.fnb;
            let html = '<select class="product-category-select" required>';
            html += '<option value="">Pilih kategori</option>';
            cats.forEach(cat => {
                html += `<option value="${cat.value}">${cat.label}</option>`;
            });
            html += '</select>';
            return html;
        }
        
        function addRegisterProductRow() {
            const container = document.getElementById('registerProductsList');
            const productId = Date.now() + productCounter++;
            
            const row = document.createElement('div');
            row.className = 'product-row-register';
            row.id = `reg-product-${productId}`;
            row.innerHTML = `
                <input type="text" class="product-name" placeholder="Nama produk" style="flex:2;">
                <input type="number" class="product-price" placeholder="Harga (RM)" step="0.01" style="flex:1;">
                ${getCategorySelectHtml()}
                <button type="button" class="btn-remove-product" onclick="removeRegisterProductRow('${productId}')">🗑️</button>
            `;
            container.appendChild(row);
        }
        
        function removeRegisterProductRow(productId) {
            const row = document.getElementById(`reg-product-${productId}`);
            if (row) row.remove();
        }
        
        function refreshAllProductRows() {
            const rows = document.querySelectorAll('#registerProductsList .product-row-register');
            rows.forEach(row => {
                const oldSelect = row.querySelector('.product-category-select');
                if (oldSelect) {
                    const oldValue = oldSelect.value;
                    const newSelectHtml = getCategorySelectHtml();
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = newSelectHtml;
                    const newSelect = tempDiv.firstChild;
                    if (oldValue && newSelect.querySelector(`option[value="${oldValue}"]`)) {
                        newSelect.value = oldValue;
                    }
                    oldSelect.replaceWith(newSelect);
                }
            });
        }
        
        document.getElementById('businessType').addEventListener('change', (e) => {
            currentBusinessType = e.target.value;
            refreshAllProductRows();
        });
        
        function getRegisterProducts() {
            const products = [];
            const rows = document.querySelectorAll('#registerProductsList .product-row-register');
            rows.forEach(row => {
                const name = row.querySelector('.product-name')?.value.trim();
                const price = parseFloat(row.querySelector('.product-price')?.value);
                const category = row.querySelector('.product-category-select')?.value;
                if (name && price > 0 && category) {
                    products.push({ name, price, category });
                }
            });
            return products;
        }
        
        // Handle Registration
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('registerMessage');
        
        if (registerForm) {
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const businessName = document.getElementById('businessName').value || '';
                const businessType = document.getElementById('businessType').value;
                const products = getRegisterProducts();
                const registerBtn = document.getElementById('registerBtn');
                
                if (password.length < 6) {
                    showMessage('Kata laluan mesti sekurang-kurangnya 6 aksara', 'error');
                    return;
                }
                
                registerBtn.disabled = true;
                registerBtn.textContent = 'Mendaftar...';
                messageDiv.style.display = 'none';
                
                try {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullName,
                                business_name: businessName,
                                business_type: businessType,
                                jenis_perniagaan: businessType
                            }
                        }
                    });
                    
                    if (error) throw error;
                    
                    if (data.user) {
                        // Create profile
                        const { error: profileError } = await supabaseClient
                            .from('profiles')
                            .insert([{
                                id: data.user.id,
                                full_name: fullName,
                                email: email,
                                business_name: businessName,
                                business_type: businessType,
                                jenis_perniagaan: businessType,
                                created_at: new Date().toISOString()
                            }]);
                        
                        if (profileError) throw profileError;
                        
                        // Insert products
                        if (products.length > 0) {
                            const productsToInsert = products.map(p => ({
                                user_id: data.user.id,
                                name: p.name,
                                price: p.price,
                                category: p.category,
                                business_type: businessType,
                                created_at: new Date().toISOString()
                            }));
                            
                            const { error: productsError } = await supabaseClient
                                .from('products')
                                .insert(productsToInsert);
                            
                            if (productsError) console.error('Products insert error:', productsError);
                        }
                        
                        showMessage('Pendaftaran berjaya!', 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    showMessage(`Ralat: ${error.message}`, 'error');
                } finally {
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Daftar Sekarang →';
                }
            });
        }
        
        function showMessage(msg, type) {
            messageDiv.style.display = 'block';
            messageDiv.className = `message-box ${type}`;
            messageDiv.innerHTML = msg;
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }
        
        // Add first product row
        addRegisterProductRow();
    </script>
    <style>
        .auth-card-large {
            max-width: 700px;
        }
        .register-products-list {
            margin-top: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .product-row-register {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .product-row-register input, .product-row-register select {
            padding: 0.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .btn-add-item-register {
            background: #1a5f7a;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-remove-product {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .products-register-section {
            margin-top: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid #e2e8f0;
        }
        @media (max-width: 768px) {
            .product-row-register {
                flex-direction: column;
            }
            .product-row-register input, .product-row-register select {
                width: 100%;
            }
        }
    </style>
    <!-- REGISTER SERVICE WORKER (PWA) -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
                .then(function(registration) {
                    console.log('✅ Service Worker registered successfully');
                })
                .catch(function(error) {
                    console.log('❌ Service Worker registration failed:', error);
                });
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akaun - UsahawanDigital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🇲🇾 Usahawan<span>Digital</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Utama</a>
                <a href="login.html">Log Masuk</a>
                <a href="register.html" class="active">Daftar</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Daftar Akaun Baru</h2>
            <p class="auth-subtitle">Percuma selama-lamanya untuk usahawan mikro</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Nama Penuh</label>
                    <input type="text" id="fullName" placeholder="contoh: Nurul Hanna Binti Suhaidy" required>
                </div>
                
                <div class="form-group">
                    <label>Emel</label>
                    <input type="email" id="email" placeholder="email@contoh.com" required>
                </div>
                
                <div class="form-group">
                    <label>Kata Laluan (minimum 6 aksara)</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="form-group">
                    <label>Nama Perniagaan (optional)</label>
                    <input type="text" id="businessName" placeholder="contoh: Kek Hanna Homemade">
                </div>

                <div class="form-group">
                    <label>🏪 Jenis Perniagaan</label>
                    <select id="businessType" required>
                        <option value="fnb">🍔 F&B (Makanan & Minuman)</option>
                        <option value="retail">👗 Retail / Butik</option>
                        <option value="servis">✂️ Perkhidmatan / Servis</option>
                    </select>
                    <small class="form-note">Jenis perniagaan ini akan menentukan kategori jualan & perbelanjaan anda nanti.</small>
                </div>
                
                <button type="submit" class="btn-primary btn-full" id="registerBtn">Daftar Sekarang →</button>
            </form>
            
            <p class="auth-footer">
                Sudah ada akaun? <a href="login.html">Log Masuk di sini</a>
            </p>
            <div id="registerMessage" class="message-box" style="display:none;"></div>
        </div>
    </div>

    <!-- Supabase Library CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    
    <script>
        // Handle Registration
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('registerMessage');
        
        if (registerForm) {
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const businessName = document.getElementById('businessName').value || '';
                const businessType = document.getElementById('businessType').value;
                const registerBtn = document.getElementById('registerBtn');
                
                // Validation
                if (password.length < 6) {
                    showMessage('Kata laluan mesti sekurang-kurangnya 6 aksara', 'error');
                    return;
                }
                
                registerBtn.disabled = true;
                registerBtn.textContent = 'Mendaftar...';
                messageDiv.style.display = 'none';
                
                try {
                    // Register with Supabase Auth
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullName,
                                business_name: businessName,
                                business_type: businessType,
                                jenis_perniagaan: businessType
                            }
                        }
                    });
                    
                    if (error) throw error;
                    
                    if (data.user) {
                        // Create profile in profiles table
                        const { error: profileError } = await supabaseClient
                            .from('profiles')
                            .insert([
                                {
                                    id: data.user.id,
                                    full_name: fullName,
                                    email: email,
                                    business_name: businessName,
                                    business_type: businessType,
                                    jenis_perniagaan: businessType,
                                    created_at: new Date().toISOString()
                                }
                            ]);
                        
                        if (profileError) {
                            console.error('Profile error:', profileError);
                            // If profile insert fails, but auth success, still let user know
                            showMessage('Pendaftaran berjaya! Tetapi terdapat ralat menyimpan profil. Sila log masuk dan kemas kini profil anda.', 'warning');
                            setTimeout(() => {
                                window.location.href = 'login.html';
                            }, 3000);
                            return;
                        }
                        
                        showMessage('Pendaftaran berjaya! Anda akan dihubungkan ke dashboard...', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 2000);
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    showMessage(`Ralat: ${error.message}`, 'error');
                } finally {
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Daftar Sekarang →';
                }
            });
        }
        
        function showMessage(msg, type) {
            messageDiv.style.display = 'block';
            messageDiv.className = `message-box ${type}`;
            messageDiv.innerHTML = msg;
            
            // Auto hide after 5 seconds for success, keep error longer
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        // For form-note styling
        const style = document.createElement('style');
        style.textContent = `
            .form-note {
                display: block;
                font-size: 0.7rem;
                color: #64748b;
                margin-top: 0.3rem;
            }
            .message-box.warning {
                background: #fef3c7;
                color: #d97706;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

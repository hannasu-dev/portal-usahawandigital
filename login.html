<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk - UsahawanDigital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🇲🇾 Usahawan<span>Digital</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Utama</a>
                <a href="modul.html">Modul</a>
                <a href="templat.html">Templat</a>
                <a href="register.html">Daftar</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="back-button-container">
                <a href="index.html" class="back-btn">← Kembali ke Utama</a>
            </div>
            <h2>Log Masuk</h2>
            <p class="auth-subtitle">Selamat kembali ke Portal UsahawanDigital</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Emel</label>
                    <input type="email" id="email" placeholder="email@contoh.com" required>
                </div>
                
                <div class="form-group">
                    <label>Kata Laluan</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="********" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>
                </div>
                
                <div class="forgot-password">
                    <a href="#" id="forgotPasswordBtn">Lupa Kata Laluan?</a>
                </div>
                
                <button type="submit" class="btn-primary btn-full" id="loginBtn">Log Masuk →</button>
            </form>
            
            <p class="auth-footer">
                Tiada akaun? <a href="register.html">Daftar Percuma</a>
            </p>
            <div id="loginMessage" class="message-box"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const type = passwordField.type === 'password' ? 'text' : 'password';
            passwordField.type = type;
        }

        // Handle Forgot Password
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        if (forgotBtn) {
            forgotBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                
                if (!email) {
                    alert('Sila masukkan emel anda terlebih dahulu');
                    return;
                }
                
                forgotBtn.textContent = 'Menghantar...';
                
                try {
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/reset-password.html'
                    });
                    
                    if (error) throw error;
                    
                    alert('Link reset password telah dihantar ke emel anda. Sila semak kotak masuk/spam.');
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    forgotBtn.textContent = 'Lupa Kata Laluan?';
                }
            });
        }
    </script>
</body>
</html>
